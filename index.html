<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O Segredo da Floresta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu">
        <h1>O Segredo da Floresta</h1>
        <p>Ajude a Chapeuzinho a escapar do monstro!</p>
        <button id="btn-jogar">Jogar</button>
    </div>

    <div id="game-container" class="hidden">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="controles-mobile">
            <button id="btn-pular">Pular ⬆️</button>
            <button id="btn-atirar">Fogo 🔥</button>
        </div>
    </div>

    <div id="game-over-screen" class="hidden">
        <h2 id="game-over-title">Fim de Jogo</h2>
        <p id="game-over-text"></p>
        <button id="btn-reiniciar">Jogar Novamente</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
